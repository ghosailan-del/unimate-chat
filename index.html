<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniMate Academic Advisor</title>

<!-- 3D model viewer library -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

/* BASIC RESET */

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
background:#eef2f7;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#1e3555;
color:white;
display:flex;
flex-direction:column;
padding:20px;
gap:18px;
transition:.3s;
}

.sidebar.closed{
width:0;
padding:0;
overflow:hidden;
}

/* MAIN */

.main{
flex:1;
width:100%;
display:flex;
flex-direction:column;
transition:0.3s;
}

.sidebar-top{
display:flex;
align-items:center;
gap:12px;
font-size:20px;
font-weight:bold;
}

.sidebar-top img{
width:40px;
}

.new-chat{
border:none;
background:#d4af57;
padding:12px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.section-title{
font-size:13px;
opacity:.7;
margin-top:10px;
}

.history{
display:flex;
flex-direction:column;
gap:10px;
}

.history-item{
background:#29456c;
padding:12px;
border-radius:10px;
cursor:pointer;
}

.history-item .time{
font-size:12px;
opacity:.7;
display:block;
margin-top:4px;
}

/* USER CARD */

.sidebar-user{
margin-top:auto;
background:#29456c;
padding:14px;
border-radius:12px;
display:flex;
gap:12px;
align-items:center;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:#5a6f94;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.meta .sub{
font-size:13px;
opacity:.7;
}

/* HEADER */

.header{
height:90px;
background:white;
display:flex;
align-items:center;
gap:16px;
padding:0 25px;
border-bottom:1px solid #ddd;
}

.menu-icon{
font-size:26px;
cursor:pointer;
}

.header-badge img{
height:65px;
object-fit:contain;
}

/* CHAT */

.messages{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:18px;
}

.bot-row{
display:flex;
gap:10px;
}

.bot-avatar{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
}

.bot-avatar img{
width:40px;
}

.bot-bubble{
background:white;
padding:14px 18px;
border-radius:16px;
max-width:420px;
}

.user{
align-self:flex-end;
background:#2b4778;
color:white;
padding:14px 18px;
border-radius:16px;
}

.input-wrap{
background:white;
padding:15px 25px;
border-top:1px solid #ddd;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
height:55px;
border-radius:14px;
border:1px solid #ddd;
padding:0 15px;
font-size:16px;
}

/* BUTTONS */

.sound-btn,.send-btn{
width:55px;
border:none;
border-radius:14px;
font-size:20px;
cursor:pointer;
}

.sound-btn{
background:#233f73;
color:white;
}

.send-btn{
background:#d4af57;
}

/* AVATAR */

.avatar-box{
position:fixed;
right:30px;
bottom:110px;
width:130px;
height:130px;
border-radius:50%;
overflow:hidden;
box-shadow:0 0 25px rgba(120,92,255,.4);
background:white;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="sidebar-top">
<img src="logo.png">
<span>UPM</span>
</div>

<button class="new-chat" onclick="newChat()">+ New Consultation</button>

<div class="section-title">History</div>
<div class="history" id="history"></div>

<div class="sidebar-user">

<div class="avatar" id="avatarInitial">JD</div>

<div class="meta">
<div id="studentName">John Doe</div>
<div class="sub" id="studentID">Student ID: 09214</div>
</div>

</div>

</aside>

<!-- MAIN AREA -->

<main class="main">

<div class="header">

<div class="menu-icon" onclick="toggleSidebar()">☰</div>

<div class="header-badge">
<img src="./UPM11.png">
</div>

<div>
<b>UniMate Academic Advisor</b><br>
UPM University
</div>

</div>

<div class="messages" id="messages"></div>

<div class="input-wrap">

<div class="input-area">

<input id="input" placeholder="Ask your academic advisor...">

<!-- SOUND TOGGLE BUTTON -->
<button class="sound-btn" id="soundBtn">🔊</button>

<button class="send-btn" id="sendBtn" onclick="send()">➤</button>

</div>

</div>

</main>

<!-- 3D ROBOT -->

<div class="avatar-box">

<model-viewer
src="miibot_3d_model.glb"
auto-rotate
camera-controls
shadow-intensity="1"
style="width:100%;height:100%;">
</model-viewer>

</div>

<script>

/* DOM ELEMENTS */

const messages=document.getElementById("messages")
const input=document.getElementById("input")
const sendBtn=document.getElementById("sendBtn")
const soundBtn=document.getElementById("soundBtn")

  // create or load session id
let sessionId = localStorage.getItem("chat_session_id");

if(!sessionId){
  sessionId = "session-" + Math.random().toString(36).substring(2,10);
  localStorage.setItem("chat_session_id", sessionId);
}
/* AUDIO PLAYER FOR ROBOT VOICE */

let audioPlayer = new Audio()

/* SOUND STATE */

let soundEnabled = true

/* MESSAGE LOCK */

let sending=false

/* SIDEBAR TOGGLE */

function toggleSidebar(){
document.querySelector(".sidebar").classList.toggle("closed")
}

/* CHAT HISTORY */

function addHistory(text){

const history=document.getElementById("history")

const item=document.createElement("div")
item.className="history-item"

item.innerHTML=text.slice(0,40)+"<span class='time'>"+formatTime()+"</span>"

history.prepend(item)

}

/* TIME FORMAT */

function formatTime(){
const now=new Date()
return now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
}

/* BOT MESSAGE */

function addBotMessage(text){

const row=document.createElement("div")
row.className="bot-row"

const avatar=document.createElement("div")
avatar.className="bot-avatar"

const img=document.createElement("img")
img.src="logo.png"

avatar.appendChild(img)

const bubble=document.createElement("div")
bubble.className="bot-bubble"
bubble.textContent=text

row.appendChild(avatar)
row.appendChild(bubble)

messages.appendChild(row)

messages.scrollTop=messages.scrollHeight

}

/* USER MESSAGE */

function addUserMessage(text){

const bubble=document.createElement("div")
bubble.className="user"
bubble.textContent=text

messages.appendChild(bubble)

messages.scrollTop=messages.scrollHeight

}

/* NEW CHAT */

function newChat(){

messages.innerHTML=""

const welcome="Hello! I'm your UniMate Academic Advisor. How can I help you today?"

addBotMessage(welcome)

}

/* SOUND TOGGLE */

soundBtn.onclick=()=>{

soundEnabled=!soundEnabled

soundBtn.textContent = soundEnabled ? "🔊" : "🔇"

if(!soundEnabled){
audioPlayer.pause()
}

}

/* SEND MESSAGE TO n8n */

async function send(){

if(sending) return

const text = input.value.trim()
if(!text) return

sending=true
sendBtn.textContent="..."

addUserMessage(text)
addHistory(text)

input.value=""

try{

const res = await fetch(
"https://ghaidaa2001.app.n8n.cloud/webhook/9709f789-eb90-43f8-915d-99220c961b0c/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
chatInput: text,
sessionId: sessionId
})
})

const data = await res.json()

const reply = data.output || "Sorry, I couldn't get a response."

addBotMessage(reply)

/* play voice */

if(data.audio){

const audio = new Audio("data:audio/mp3;base64," + data.audio)
audio.preload = "auto"
audioPlayer = audio

if(soundEnabled){
audio.play().catch(()=>{})
}

}

}

}catch(err){

console.error(err)

addBotMessage("Connection error with the AI service.")

}

sendBtn.textContent="➤"
sending=false

}

/* ENTER TO SEND */

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send()
})

/* STUDENT LOGIN */

function askStudent(){

let name=localStorage.getItem("studentName")
let id=localStorage.getItem("studentID")

if(!name){

name=prompt("Enter your name")
id=prompt("Enter your student ID")

localStorage.setItem("studentName",name)
localStorage.setItem("studentID",id)

}

document.getElementById("studentName").textContent=name
document.getElementById("studentID").textContent="Student ID: "+id
document.getElementById("avatarInitial").textContent=name[0]

}

/* PAGE LOAD */

window.addEventListener("load",()=>{

askStudent()

const welcome="Hello! I'm your UniMate Academic Advisor. How can I help you today?"

addBotMessage(welcome)

})

</script>

</body>
</html>
