<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniMate Academic Advisor</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
background:#eef2f7;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#1e3555;
color:white;
display:flex;
flex-direction:column;
padding:20px;
gap:18px;
transition:.3s;
}

.sidebar.closed{
width:0;
padding:0;
overflow:hidden;
}

.main{
flex:1;
width:100%;
transition:0.3s;
}

.sidebar-top{
display:flex;
align-items:center;
gap:12px;
font-size:20px;
font-weight:bold;
}

.sidebar-top img{
width:40px;
}

.new-chat{
border:none;
background:#d4af57;
padding:12px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.section-title{
font-size:13px;
opacity:.7;
margin-top:10px;
}

.history{
display:flex;
flex-direction:column;
gap:10px;
}

.history-item{
background:#29456c;
padding:12px;
border-radius:10px;
cursor:pointer;
}

.history-item .time{
font-size:12px;
opacity:.7;
display:block;
margin-top:4px;
}

/* USER CARD */

.sidebar-user{
margin-top:auto;
background:#29456c;
padding:14px;
border-radius:12px;
display:flex;
gap:12px;
align-items:center;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:#5a6f94;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.meta .sub{
font-size:13px;
opacity:.7;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
height:90px;
background:white;
display:flex;
align-items:center;
gap:16px;
padding:0 25px;
border-bottom:1px solid #ddd;
}

.menu-icon{
font-size:26px;
cursor:pointer;
}

.header-badge{
display:flex;
align-items:center;
justify-content:center;
background:none;
}

.header-badge img{
height:65px;
width:auto;
object-fit:contain;
}

.messages{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:18px;
}

.bot-row{
display:flex;
gap:10px;
}

.bot-avatar{
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:transparent;
}

.bot-avatar img{
  width:40px;
  height:auto;
  object-fit:contain;
}
.bot-bubble{
background:white;
padding:14px 18px;
border-radius:16px;
max-width:420px;
}

.user{
align-self:flex-end;
background:#2b4778;
color:white;
padding:14px 18px;
border-radius:16px;
}

.input-wrap{
background:white;
padding:15px 25px;
border-top:1px solid #ddd;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
height:55px;
border-radius:14px;
border:1px solid #ddd;
padding:0 15px;
font-size:16px;
}

.sound-btn,.send-btn{
width:55px;
border:none;
border-radius:14px;
font-size:20px;
cursor:pointer;
}

.sound-btn{
background:#233f73;
color:white;
}

.send-btn{
background:#d4af57;
}

/* AVATAR */

.avatar-box{
position:fixed;
right:30px;
bottom:110px;
width:130px;
height:130px;
border-radius:50%;
overflow:hidden;
box-shadow:0 0 25px rgba(120,92,255,.4);
}

#avatarVideo{
width:120%;
height:120%;
object-fit:cover;
transform:translate(-10%,-5%);
}

</style>
</head>

<body>

<aside class="sidebar">

<div class="sidebar-top">
<img src="logo.png">
<span>UPM</span>
</div>

<button class="new-chat" onclick="newChat()">+ New Consultation</button>

<div class="section-title">History</div>
<div class="history" id="history"></div>

<div class="sidebar-user">

<div class="avatar" id="avatarInitial">JD</div>

<div class="meta">
<div id="studentName">John Doe</div>
<div class="sub" id="studentID">Student ID: 09214</div>
</div>

</div>

</aside>

<main class="main">

<div class="header">

<div class="menu-icon" onclick="toggleSidebar()">☰</div>

<div class="header-badge">
<img src="<./UPM11.png">
</div>

<div>
<b>UniMate Academic Advisor</b><br>
UPM University
</div>

</div>

<div class="messages" id="messages"></div>

<div class="input-wrap">

<div class="input-area">

<input id="input" placeholder="Ask your academic advisor...">

<button class="sound-btn" id="soundBtn">🔊</button>

<button class="send-btn" onclick="send()">➤</button>

</div>

</div>

</main>

<div class="avatar-box">
<video id="avatarVideo" playsinline></video>
</div>

<script>

const API_KEY="Z2hvc2FpbGFuQGdtYWlsLmNvbQ:f4xZ46n7pzio6yyqbid67"

const messages=document.getElementById("messages")
const input=document.getElementById("input")
const avatarVideo=document.getElementById("avatarVideo")

/* SIDEBAR */

function toggleSidebar(){
document.querySelector(".sidebar").classList.toggle("closed")
}

/* HISTORY */

function addHistory(text){

const history=document.getElementById("history")

const item=document.createElement("div")
item.className="history-item"

item.innerHTML=text+"<span class='time'>"+formatTime()+"</span>"

history.prepend(item)

}

/* TIME */

function formatTime(){
const now=new Date()
return now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
}

/* BOT MESSAGE */

function addBotMessage(text){

const row=document.createElement("div")
row.className="bot-row"

const avatar=document.createElement("div")
avatar.className="bot-avatar"

const img=document.createElement("img")
img.src="logo.png"

avatar.appendChild(img)

const bubble=document.createElement("div")
bubble.className="bot-bubble"
bubble.textContent=text

row.appendChild(avatar)
row.appendChild(bubble)

messages.appendChild(row)

}

/* USER MESSAGE */

function addUserMessage(text){

const bubble=document.createElement("div")
bubble.className="user"
bubble.textContent=text

messages.appendChild(bubble)

}

/* NEW CHAT */

function newChat(){

messages.innerHTML=""

const welcome="Hello! I'm your UniMate Academic Advisor. How can I help you today?"

addBotMessage(welcome)

generateAvatar(welcome)

}


/* SEND */

async function send(){

const text = input.value.trim()
if(!text) return

addUserMessage(text)
addHistory(text)

input.value=""

/* إرسال الرسالة إلى n8n */

try{

const res = await fetch(
"https://ghaidaa2001.app.n8n.cloud/webhook/9709f789-eb90-43f8-915d-99220c961b0c/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
})

const data = await res.json()

/* استخراج الرد القادم من الشات */

const reply =
data.output ||
data.answer ||
data.response ||
data.text ||
"Sorry, I couldn't get a response."

addBotMessage(reply)

/* تشغيل الأفاتار بنفس الرد */

generateAvatar(reply)

}catch(err){

console.error(err)

addBotMessage("Connection error with the AI service.")

}

}
/* ENTER SEND */

input.addEventListener("keydown",(e)=>{

if(e.key==="Enter") send()

})

/* STUDENT LOGIN */

function askStudent(){

let name=localStorage.getItem("studentName")
let id=localStorage.getItem("studentID")

if(!name){

name=prompt("Enter your name")
id=prompt("Enter your student ID")

localStorage.setItem("studentName",name)
localStorage.setItem("studentID",id)

}

document.getElementById("studentName").textContent=name
document.getElementById("studentID").textContent="Student ID: "+id

document.getElementById("avatarInitial").textContent=name[0]

}

/* AVATAR */

async function generateAvatar(text){

const res=await fetch("http://localhost:3001/talk",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text})
})

const data=await res.json()

checkVideo(data.id)

}

async function checkVideo(id){

let ready=false

while(!ready){

const res=await fetch(`https://api.d-id.com/talks/${id}`,{
headers:{Authorization:`Basic ${btoa(API_KEY+":")}`}
})

const data=await res.json()

if(data.status==="done"){

avatarVideo.src=data.result_url

avatarVideo.play()

ready=true

}

await new Promise(r=>setTimeout(r,2000))

}

}

/* ON LOAD */

window.addEventListener("load",()=>{

askStudent()

const welcome="Hello! I'm your UniMate Academic Advisor. How can I help you today?"

addBotMessage(welcome)

generateAvatar(welcome)

})

</script>

</body>
</html>
